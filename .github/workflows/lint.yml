name: Lint
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Setup
        run: make -C .lint distclean build-tools
      - name: Lint
        run: make -C .lint lint
